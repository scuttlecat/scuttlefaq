<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {% if page.title %}
    <title>{{ page.title }} — {{ site.title }}</title>
  {% else %}
    <title>{{ site.title }}</title>
  {% endif %}

  <!-- ── Open Graph tags: this is what Discord reads ── -->
  <!-- FAQ pages set `summary` in their front matter, which becomes
       og:description. The index falls back to the site description. -->
  <meta property="og:type" content="{% if page.summary %}article{% else %}website{% endif %}">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.summary | default: site.description | strip_newlines | strip }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta name="theme-color" content="{{ site.embed_color }}">
  <meta name="twitter:card" content="summary">

  <style>
    :root {
        --ink: #d6dee9;        /* body text */
        --paper: #0a0e16;      /* page background */
        --panel: #0e1420;      /* answer card background */
        --accent: #c9a961;     /* gold — links, region names */
        --rule: #1f2b3d;       /* hairlines */
        --muted: #8fa3bd;      /* secondary text */
    }

    table {
        width: 100%;
        border-collapse: collapse;   /* this is what makes borders actually meet */
        font: 14px/1.5 system-ui, sans-serif;
        margin: 1.25rem 0;
    }
    th {
        text-align: left;
        padding: 8px 12px;
        color: var(--muted);
        font-weight: 500;
        font-size: 12px;
        letter-spacing: .06em;
        border-bottom: 1px solid var(--rule);
    }
    td {
    padding: 9px 12px;
    border-bottom: 0.5px solid #1a2432;
    }
    td:first-child {          /* region column */
        color: var(--accent);
        font-weight: 500;
    }
    td:last-child { text-align: right; }
    tr:last-child td { border-bottom: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="site">
      <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
      <p>{{ site.description }}</p>
    </header>
    <main>
      {{ content }}
    </main>
  </div>
</body>
</html>
